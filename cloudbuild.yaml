# Google Cloud Build configuration for auto-deploy
steps:
  # Build and deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: gcloud
    args:
      - 'run'
      - 'deploy'
      - 'rustybot-discord'
      - '--source=.'
      - '--region=us-west1'
      - '--platform=managed'
